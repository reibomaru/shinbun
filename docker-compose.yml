services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: shinbun-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: shinbun_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
