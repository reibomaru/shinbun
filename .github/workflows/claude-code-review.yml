name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  claude-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@5d0cc745cd0cce4c0e9e0b3511de26c3bc285eb5 # v1.0.71
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            /review-pr ${{ github.repository }} ${{ github.event.pull_request.number }}

            追加チェック: docs/ 配下の設計書と実装の整合性を確認してください。
            PRの変更内容が以下の設計書と乖離していないか検証し、乖離があればレビューコメントで指摘してください:
            - UI / フロントエンド変更 → docs/ui_screen_design.md
            - DB スキーマ / バックエンド / バッチ処理 → docs/ai_tech_daily_aggregator_technical_design.md
            - 機能仕様 / ユーザーフロー → docs/ai_tech_daily_aggregator_prd_v_2.md
            乖離がある場合は「設計書の更新が必要」と明示し、具体的にどの箇所を更新すべきか指摘してください。
          claude_args: "--allowedTools Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr comment:*),Bash(gh api:*),Bash(jq:*),Read,Glob,Grep,Task,WebFetch,Agent,Skill,mcp__github_inline_comment__create_inline_comment"
          plugins: |
            review-pr@agent-plugins
          plugin_marketplaces: |
            https://github.com/reibomaru/agent-plugins.git
          use_sticky_comment: true
          show_full_output: true
