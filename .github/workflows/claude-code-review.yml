name: Claude Code Review

on:
  pull_request:
    types: [opened]

jobs:
  claude-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1.0.63
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            /review-pr ${{ github.repository }} ${{ github.event.pull_request.number }}

            追加チェック: docs/ 配下の設計書と実装の整合性を確認してください。
            PRの変更内容が以下の設計書と乖離していないか検証し、乖離があればレビューコメントで指摘してください:
            - UI / フロントエンド変更 → docs/ui_screen_design.md
            - DB スキーマ / バックエンド / バッチ処理 → docs/ai_tech_daily_aggregator_technical_design.md
            - 機能仕様 / ユーザーフロー → docs/ai_tech_daily_aggregator_prd_v_2.md
            乖離がある場合は「設計書の更新が必要」と明示し、具体的にどの箇所を更新すべきか指摘してください。
          claude_args: |
            --allowedTools "Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr comment:*),Bash(gh api:*),Bash(jq:*),Bash(echo:*),Read,Glob,Grep,Task,WebFetch"
          use_sticky_comment: true
